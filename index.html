      rel="stylesheet"
    />

    <style>
      .v-application,
      .v-application .body-1,
      .v-application .body-2,
      .v-application .caption,
      .v-application .display-1,
      .v-application .display-2,
      .v-application .display-3,
      .v-application .display-4,
      .v-application .headline,
      .v-application .overline,
      .v-application .subtitle-1,
      .v-application .subtitle-2,

        font-family: 'Fjalla One', sans-serif !important;
      }
      :-webkit-any(article, aside, nav, section) h1 {

  <body>
    <div id="app">
      <div
        data-app="true"
        class="v-application v-application--is-ltr theme--light"
        id="app"
      >
        <div class="v-application--wrap">
          <nav>
            <header
              class="v-sheet theme--light v-toolbar v-app-bar v-app-bar--elevate-on-scroll v-app-bar--fixed v-app-bar--hide-shadow white"
              data-booted="true"
              style="
                margin-top: 0px;
                transform: translateY(0px);
                left: 0px;
                right: 0px;
              "
            >
              <div class="v-toolbar__content justify-center flex-wrap">
              </div>
            </header>
            <!---->
          </nav>
          <header class="container fill-height" style="min-height: 100vh">
            <div class="row align-center justify-center">
              <div class="text-center col-md-10 col-12">
                <h1 class="display-4" data-aos="fade-up">J677</h1>
                <h2 data-aos="fade-up">Minecraft Modder, Model & Texture Artist</h2>
              </div>
              <div class="text-center col-md-5 col-12" data-aos="fade-up">
                <p>
                  A portfolio of some of my work
                </p>
              </div>
            </div>
              <p>
                  <img src="J677Portfolio.png" alt="J677's Entity Models">
                </p>
          </header>
          <main>
             <img src="https://github.com/user-attachments/assets/0fbd6e65-9e03-4774-9358-4922a59a8450">
          </main>
          <footer data-booted="true" class="v-footer v-sheet theme--light">
            <div class="spacer"></div>
            <small
              >Template made with
              <i
                aria-hidden="true"
                class="v-icon notranslate red--text mdi mdi-heart theme--light"
              ></i>
              by
              <a href="https://twitter.com/jrtiquez" target="_blank"
                >Jofferson R Tiquez</a
              ></small
            >
          </footer>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
    <script src="config.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      var vm = new Vue({
        el: '#app',
        vuetify: new Vuetify({
          theme: {
            themes: {
              light: {
                primary: '#1976D2',
                secondary: '#424242',
                accent: '#82B1FF',
                error: '#FF5252',
                info: '#2196F3',
                success: '#4CAF50',
                warning: '#FFC107',
              },
            },
          },
        }),
        data() {
          return {
            menu: false,
            ...window.PorfolioConfig,
          }
        },
        computed: {
          $isMobile() {
            return this.$vuetify.breakpoint.smAndDown
          },
          sectionHeight() {
            return { style: 'min-height: 100vh', class: 'fill-height' }
          },
          contactLinks() {
            if (
              this.contacts &&
              this.contacts.links &&
              this.contacts.links.length
            ) {
              return this.contacts.links
            }
            return []
          },
        },
      })
      
      AOS.init({
        once: true,
        delay: 0
      });
    </script>
  </body>
</html>
